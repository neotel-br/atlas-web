services:
  web:
    image: "${PROD_IMAGE_NAME:-atlas}:${PROD_IMAGE_TAG:-local}"
    build:
      context: .
      target: prod
      args:
        VCS_REF: "${VCS_REF:-local}"
        BUILD_DATE: "${BUILD_DATE:-unknown}"
    expose:
      - "80"
    environment:
      SERVER_NAME: "${SERVER_NAME:-_}"
      NGINX_CLIENT_MAX_BODY_SIZE: "${NGINX_CLIENT_MAX_BODY_SIZE:-2m}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 10s
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
      - /etc/nginx/conf.d
    volumes:
      - docs_build:/usr/share/nginx/html:ro
    depends_on:
      - docs-watcher
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.atlas.rule=Host(`${SERVER_NAME}`)"
      - "traefik.http.routers.atlas.entrypoints=websecure"
      - "traefik.http.routers.atlas.tls=true"
      - "traefik.http.services.atlas.loadbalancer.server.port=80"

  docs-watcher:
    build:
      context: .
      target: build
    command: ["sh", "-c", "npm run build && npm run watch:docs"]
    volumes:
      - ./content/docs:/app/content/docs
      - docs_build:/app/out
    restart: unless-stopped
    networks:
      - web

  traefik:
    image: traefik:v3.7.5
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - "${TRAEFIK_CERT_PATH}:/etc/traefik/certs/cert.pem:ro"
      - "${TRAEFIK_KEY_PATH}:/etc/traefik/certs/key.pem:ro"
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    driver: bridge

volumes:
  docs_build:
