services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "${DEV_PORT:-3000}:3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    stdin_open: true
    tty: true
    volumes:
      - .:/app
      - neodocs_node_modules:/app/node_modules
      - neodocs_next_cache:/app/.next

volumes:
  neodocs_node_modules:
  neodocs_next_cache:
